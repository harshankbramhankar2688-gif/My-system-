<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM: DAILY QUEST</title>
    <style>
        body { background-color: #02060c; color: #00f2ff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .system-window { width: 90%; max-width: 400px; background: rgba(0, 20, 40, 0.95); border: 2px solid #00f2ff; padding: 20px; box-shadow: 0 0 20px #00f2ff; border-radius: 5px; }
        h1 { text-align: center; font-size: 20px; border-bottom: 2px solid #00f2ff; padding-bottom: 10px; text-shadow: 0 0 10px #00f2ff; }
        .date-display { text-align: center; font-size: 14px; color: #80f9ff; margin-bottom: 20px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 16px; }
        .quest-box { border: 1px solid rgba(0, 242, 255, 0.3); padding: 15px; margin-top: 15px; background: rgba(0, 242, 255, 0.05); }
        .quest-item { cursor: pointer; padding: 10px; border-bottom: 1px solid rgba(0, 242, 255, 0.1); transition: 0.3s; }
        .quest-item:hover { background: rgba(0, 242, 255, 0.2); }
        .completed { text-decoration: line-through; color: #555; border-left: 4px solid #555; }
        .xp-container { width: 100%; height: 10px; background: #111; border: 1px solid #00f2ff; margin-top: 5px; }
        #xp-fill { width: 0%; height: 100%; background: #00f2ff; transition: width 0.5s; }
        .warning { color: #ff4d4d; font-size: 11px; text-align: center; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="system-window">
    <h1>QUEST INFO</h1>
    <div id="current-date" class="date-display"></div>

    <div class="stat-row"><span>PLAYER:</span> <span>SYCROS_16</span></div>
    <div class="stat-row"><span>LEVEL:</span> <span>01</span></div>
    <div style="font-size: 12px;">XP PROGRESS:</div>
    <div class="xp-container"><div id="xp-fill"></div></div>

    <div class="quest-box">
        <div style="color: #ffcc00; margin-bottom: 10px; font-weight: bold;">[DAILY QUEST: PREPARE FOR POWER]</div>
        <div class="quest-item" onclick="toggleTask(this, 33)">1. 100 Push-ups</div>
        <div class="quest-item" onclick="toggleTask(this, 33)">2. 100 Sit-ups</div>
        <div class="quest-item" onclick="toggleTask(this, 34)">3. 10km Running</div>
    </div>

    <div class="warning">WARNING: FAILURE TO COMPLETE WILL RESULT IN A PENALTY.</div>
</div>

<script>
    // Tarikh dakhvnyasathi
    const d = new Date();
    document.getElementById('current-date').innerHTML = d.toDateString();

    let currentXP = 0;
    function toggleTask(element, xp) {
        if (!element.classList.contains('completed')) {
            element.classList.add('completed');
            currentXP += xp;
            if (currentXP > 100) currentXP = 100;
            document.getElementById('xp-fill').style.width = currentXP + '%';
        }
    }
</script>

</body>
</html>
