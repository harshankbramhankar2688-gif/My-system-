<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM STATUS</title>
    <style>
        body { background-color: #02060c; color: #00f2ff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .window { border: 2px solid #00f2ff; background: rgba(0, 20, 40, 0.9); width: 100%; max-width: 350px; padding: 20px; box-shadow: 0 0 20px #00f2ff; border-radius: 10px; }
        h1 { text-align: center; font-size: 20px; border-bottom: 2px solid #00f2ff; padding-bottom: 10px; }
        .stat { display: flex; justify-content: space-between; margin: 10px 0; }
        .quest { border: 1px solid #00f2ff; padding: 10px; margin-top: 20px; background: rgba(0, 242, 255, 0.1); }
    </style>
</head>
<body>
    <div class="window">
        <h1>PLAYER STATUS</h1>
        <div class="stat"><span>LEVEL:</span> <span>01</span></div>
        <div class="stat"><span>STRENGTH:</span> <span>10</span></div>
        <div class="stat"><span>AGILITY:</span> <span>10</span></div>
        <div class="quest">
            <p><strong>DAILY QUEST:</strong></p>
            <p>- 50 Pushups</p>
            <p>- 20 Min Reading</p>
        </div>
    </div>
</body>
</html>
